<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DinoWorld</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #e0f7ff, #ffffff);
    overflow-x: hidden;
}

/* TOP TITLE */
header {
    text-align: center;
    padding: 40px 20px;
}

header h1 {
    font-size: 2.5em;
    color: #1a8cff;
}

/* EMOJIS */
.emoji {
    position: fixed;
    font-size: 60px;
    text-decoration: none;
    animation: float 10s linear infinite;
}

/* FLOAT ANIMATION */
@keyframes float {
    from {
        transform: translateY(100vh) rotate(0deg);
    }
    to {
        transform: translateY(-120vh) rotate(360deg);
    }
}

/* OPTIONAL CARD AREA (simple landing look) */
.info {
    text-align: center;
    margin-top: 50px;
    color: #444;
}

</style>
</head>

<body>

<!-- CLICKABLE BIG DINOSAUR EMOJIS -->
<a href="facts.html" class="emoji" style="left:10%; animation-delay:0s;">🦖</a>
<a href="facts.html" class="emoji" style="left:25%; animation-delay:2s;">🦖</a>
<a href="facts.html" class="emoji" style="left:40%; animation-delay:4s;">🦖</a>
<a href="facts.html" class="emoji" style="left:65%; animation-delay:1s;">🦖</a>
<a href="facts.html" class="emoji" style="left:85%; animation-delay:3s;">🦖</a>

<!-- TITLE -->
<header>
    <h1>Try clicking the dinosaur emojis 🦖</h1>
</header>

<!-- SIMPLE INFO -->
<div class="info">
    <p>Welcome to DinoWorld 🌍</p>
    <p>Click the flying dinosaurs to explore fun facts!</p>
</div>

</body>
</html>
